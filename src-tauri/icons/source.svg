<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- macOS-style rounded-square background, pitch-black canvas -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="#0a0a0a"/>

  <!-- Subtle inner stroke for crisp edge at small sizes -->
  <rect x="0.5" y="0.5" width="1023" height="1023" rx="179.5" ry="179.5"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Mascot with lime glow.
       Scale 60 + translate puts the eye+mouth bbox visually centered.
       Bbox in viewBox units: x 3.55..12.45 (w 8.9), y 4.95..11.95 (h 7.0)
       Bbox center (8, 8.45) → after scale lands at (480, 507); shift to canvas center 512. -->
  <g filter="url(#glow)">
    <g transform="translate(32, 5) scale(60)" fill="#d3ec5a">
      <circle cx="5" cy="6.4" r="1.45"/>
      <circle cx="11" cy="6.4" r="1.45"/>
      <circle cx="8" cy="11" r="0.95" opacity="0.9"/>
    </g>
  </g>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
